<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>狂飙突击 - 磁铁增强版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #020617; touch-action: none;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex; justify-content: center; align-items: center;
        }
        #gameWrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100%;
            background: #020617;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        #gameCanvas { display: block; width: 100%; height: 100%; }
        #damageFlash {
            position: absolute; inset: 0; pointer-events: none;
            background: radial-gradient(circle, transparent 50%, rgba(239, 68, 68, 0.4) 100%);
            opacity: 0; transition: opacity 0.3s; z-index: 10;
        }
        .lane-divider {
            position: absolute; left: 50%; top: 0; bottom: 0;
            width: 1px; background: linear-gradient(to bottom, transparent, rgba(51, 65, 85, 0.3), transparent);
            z-index: 1; pointer-events: none;
        }
        .max-stat {
            color: #fbbf24 !important;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.8);
            animation: pulse-gold 1.5s infinite;
        }
        @keyframes pulse-gold {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div id="gameWrapper">
        <div class="lane-divider"></div>
        <div id="damageFlash"></div>
        <canvas id="gameCanvas"></canvas>

        <div id="uiLayer" class="absolute inset-0 pointer-events-none flex flex-col justify-end p-6">
            <!-- Threat Alert -->
            <div id="threatAlert" class="hidden absolute top-20 left-1/2 -translate-x-1/2 px-4 py-1 bg-amber-500/10 border border-amber-500/30 rounded-full">
                <span class="text-amber-500 text-[10px] font-bold uppercase tracking-widest animate-pulse">High Threat Level: Scaling Resistance</span>
            </div>

            <div id="bossWarning" class="hidden absolute top-1/3 left-0 w-full text-center py-4 bg-red-600/20 border-y border-red-500 backdrop-blur-sm z-20">
                <span class="text-red-500 font-black text-2xl tracking-[0.3em] animate-pulse uppercase">Tactical Alert: Elite Boss Detected</span>
            </div>

            <div class="flex flex-col gap-4 mb-4">
                <div class="bg-slate-900/90 backdrop-blur-xl rounded-3xl border border-slate-800 p-4 flex flex-col gap-4 pointer-events-auto shadow-2xl">
                    <div class="flex justify-between items-end border-b border-slate-800 pb-3">
                        <div class="flex flex-col">
                            <span class="text-slate-500 text-[10px] font-black uppercase tracking-widest">Score</span>
                            <span id="scoreDisplay" class="text-white text-3xl font-black leading-none">0</span>
                        </div>
                        <div class="flex flex-col items-end">
                            <span id="comboDisplay" class="text-amber-500 text-lg font-black italic">0x</span>
                            <span class="text-slate-500 text-[8px] font-bold uppercase tracking-tighter">Chain</span>
                        </div>
                    </div>

                    <div class="flex justify-between items-center px-2">
                        <div id="livesContainer" class="flex gap-1.5"></div>
                        <div class="grid grid-cols-4 gap-4">
                            <div class="text-center">
                                <span class="text-slate-500 text-[9px] block font-black uppercase">Dmg</span>
                                <span id="dmgDisplay" class="text-white font-bold text-base">1</span>
                            </div>
                            <div class="text-center">
                                <span class="text-slate-500 text-[9px] block font-black uppercase">Rpm</span>
                                <span id="fireRateDisplay" class="text-white font-bold text-base">2.5</span>
                            </div>
                            <div class="text-center">
                                <span class="text-slate-500 text-[9px] block font-black uppercase">Drn</span>
                                <span id="clonesDisplay" class="text-white font-bold text-base">0</span>
                            </div>
                            <!-- 新增磁铁范围显示 -->
                            <div class="text-center">
                                <span class="text-slate-500 text-[9px] block font-black uppercase">Mag</span>
                                <span id="magDisplay" class="text-white font-bold text-base">60</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="menuScreen" class="absolute inset-0 bg-slate-950 flex flex-col items-center justify-center pointer-events-auto z-50 p-8 text-center">
            <h1 class="text-5xl font-black text-white italic tracking-tighter mb-2">LAST WAR</h1>
            <p class="text-slate-600 text-[10px] tracking-[0.5em] uppercase mb-12">Magnet System v14.0</p>
            
            <div id="gameOverStats" class="hidden flex-col items-center mb-10">
                <span id="finalScore" class="text-6xl font-black text-white mb-2">0</span>
                <span class="text-slate-500 text-sm uppercase tracking-widest font-bold">Operation Result</span>
            </div>

            <button id="startBtn" class="w-full max-w-xs py-5 bg-white text-slate-950 font-black rounded-xl hover:scale-105 active:scale-95 transition-all text-lg uppercase tracking-widest">
                开始作战
            </button>
        </div>
    </div>

<script type="module">
    const dom = {
        score: document.getElementById('scoreDisplay'),
        combo: document.getElementById('comboDisplay'),
        dmg: document.getElementById('dmgDisplay'),
        rpm: document.getElementById('fireRateDisplay'),
        drn: document.getElementById('clonesDisplay'),
        mag: document.getElementById('magDisplay'),
        flash: document.getElementById('damageFlash'),
        lives: document.getElementById('livesContainer'),
        menu: document.getElementById('menuScreen'),
        ui: document.getElementById('uiLayer'),
        finalScore: document.getElementById('finalScore'),
        gameOver: document.getElementById('gameOverStats'),
        wrapper: document.getElementById('gameWrapper'),
        bossWarn: document.getElementById('bossWarning'),
        threat: document.getElementById('threatAlert')
    };

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });

    const STATE = { MENU: 0, PLAYING: 1, GAMEOVER: 2 };
    let gameState = STATE.MENU;
    let width, height, player, bullets = [], enemies = [], gates = [], drops = [];
    let score = 0, combo = 0, gameSpeed = 1, distance = 0, lastTime = 0;
    
    let nextBossDistance = 15000; 
    let isBossFight = false;

    const MAX_FIRE_RATE = 8.0;    
    const MAX_CLONES = 4;         
    const MAX_SPREAD_WIDTH = 0.4; 

    const spriteCache = {
        enemy: null, elite: null, boss: null,
        init() {
            const size = 50;
            const c = document.createElement('canvas');
            c.width = size; c.height = size;
            const tctx = c.getContext('2d');
            tctx.fillStyle = '#0f172a'; tctx.fillRect(0,0,size,size);
            tctx.strokeStyle = '#ef4444'; tctx.lineWidth = 3; tctx.strokeRect(2,2,size-4,size-4);
            this.enemy = c;

            const ec = document.createElement('canvas');
            ec.width = size; ec.height = size;
            const etctx = ec.getContext('2d');
            etctx.fillStyle = '#1e1b4b'; etctx.fillRect(0,0,size,size);
            etctx.strokeStyle = '#fbbf24'; etctx.lineWidth = 4; etctx.strokeRect(2,2,size-4,size-4);
            etctx.strokeRect(8,8,size-16,size-16);
            this.elite = ec;

            const bSize = 130;
            const bc = document.createElement('canvas');
            bc.width = bSize; bc.height = bSize;
            const btctx = bc.getContext('2d');
            btctx.fillStyle = '#450a0a'; btctx.fillRect(0,0,bSize,bSize);
            btctx.strokeStyle = '#f87171'; btctx.lineWidth = 5; btctx.strokeRect(3,3,bSize-6,bSize-6);
            this.boss = bc;
        }
    };
    spriteCache.init();

    class Player {
        constructor() {
            this.x = width / 2; this.y = height - 180; 
            this.targetX = width / 2;
            this.radius = 16; 
            this.damage = 1; 
            this.fireRate = 2.5; 
            this.clones = 0;
            this.magnetRadius = 60; // 初始磁铁半径
            this.lastShot = 0; 
            this.lives = 5; 
            this.isInvincible = false; 
            this.invincibleTimer = 0;
        }

        getStrength() {
            const rpmWeight = this.fireRate / 2.5; 
            const dmgWeight = this.damage;         
            const drnWeight = 1 + (this.clones * 0.5); 
            return rpmWeight * dmgWeight * drnWeight;
        }

        takeDamage() {
            if (this.isInvincible || gameState !== STATE.PLAYING) return;
            this.lives--;
            updateLivesUI();
            dom.flash.style.opacity = '1';
            setTimeout(() => { if(dom.flash) dom.flash.style.opacity = '0'; }, 200);
            if (this.lives <= 0) endGame();
            else this.startInvincibility(1500);
        }

        startInvincibility(ms) {
            this.isInvincible = true;
            this.invincibleTimer = ms;
        }

        update(dt, now) {
            this.x += (this.targetX - this.x) * 0.18;
            this.x = Math.max(25, Math.min(width - 25, this.x));
            if (this.isInvincible) {
                this.invincibleTimer -= dt;
                if (this.invincibleTimer <= 0) this.isInvincible = false;
            }
            if (now - this.lastShot > 1000 / this.fireRate) {
                this.shoot(); this.lastShot = now;
            }
        }

        shoot() {
            const count = 1 + this.clones;
            let spread = 22; 
            const maxAllowedWidth = width * MAX_SPREAD_WIDTH;
            const currentTotalWidth = (count - 1) * spread;

            if (currentTotalWidth > maxAllowedWidth) {
                spread = maxAllowedWidth / (count - 1);
            }

            const startX = this.x - ((count - 1) * spread) / 2;
            for (let i = 0; i < count; i++) {
                bullets.push({ x: startX + i * spread, y: this.y - 15, dmg: this.damage, speed: 20 });
            }
        }

        draw() {
            // 可视化磁铁范围（仅调试或淡淡的特效）
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.magnetRadius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(56, 189, 248, 0.05)';
            ctx.stroke();

            ctx.save();
            ctx.fillStyle = this.isInvincible ? '#60a5fa' : '#38bdf8';
            if (this.isInvincible) ctx.globalAlpha = 0.4 + (Math.sin(Date.now()/40)*0.3);
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }
    }

    function applyBuff(type) {
        if (type === 'rpm') player.fireRate = Math.min(MAX_FIRE_RATE, player.fireRate + 0.4);
        else if (type === 'dmg') player.damage += 1; 
        else if (type === 'drones') player.clones = Math.min(MAX_CLONES, player.clones + 1);
        else if (type === 'mag') player.magnetRadius += 15; // 磁铁范围增加
        updateDisplays(true);
    }

    function spawnBoss() {
        isBossFight = true;
        dom.bossWarn.classList.remove('hidden');
        setTimeout(() => dom.bossWarn.classList.add('hidden'), 3000);

        const strengthFactor = player ? Math.sqrt(player.getStrength()) : 1;
        const bossHpScaling = (180 + Math.pow(distance / 15000, 2) * 800) * strengthFactor;
        
        enemies.push({
            x: width * 0.75 - 65,
            y: -200,
            hp: bossHpScaling,
            maxHp: bossHpScaling,
            speed: 0.12, 
            isBoss: true, isElite: false, width: 130, height: 130
        });
        nextBossDistance += 25000;
    }

    function gameLoop(now) {
        if (gameState !== STATE.PLAYING || !player) return;
        const dt = now - lastTime; lastTime = now;
        
        ctx.fillStyle = '#020617'; ctx.fillRect(0, 0, width, height);
        
        distance += 2.5 * gameSpeed;
        gameSpeed = 1 + (distance / 500000); 

        const strength = player.getStrength();
        if (strength > 4.5) dom.threat.classList.remove('hidden');
        else dom.threat.classList.add('hidden');

        const difficultyScale = Math.min(2.8, 0.6 + (strength * 0.15) + (distance / 60000));
        const spawnScale = Math.min(1.0, 0.25 + (distance / 15000) * 0.75);
        const baseSpawnChance = isBossFight ? 0.05 : 0.025; 
        const adaptiveSpawnChance = Math.min(0.065, baseSpawnChance * (1 + strength * 0.04));
        
        if (Math.random() < (adaptiveSpawnChance * spawnScale) * gameSpeed) {
            const isElite = strength > 2.0 && Math.random() < Math.min(0.35, strength * 0.025);
            let baseHp = 1;
            if (distance > 5000) {
                baseHp = 1 + Math.pow((distance - 5000) / 15000, 2.0) * 15;
            }
            const finalHp = Math.ceil(baseHp * difficultyScale * (isElite ? 4.5 : 1));
            
            enemies.push({ 
                x: (width * 0.5) + 15 + Math.random() * (width * 0.5 - 80), 
                y: -60, 
                hp: finalHp, 
                speed: (isElite ? 0.85 : 0.45 + Math.random() * 0.35) * gameSpeed, 
                isBoss: false, isElite: isElite,
                width: 50, height: 50
            });
        }

        const gateInterval = 1200;
        if (Math.floor(distance + 800) % gateInterval < 6 && !isBossFight) {
            const types = ['rpm', 'dmg', 'drones', 'mag'];
            const t1 = types[Math.floor(Math.random() * types.length)];
            gates.push({ 
                x: 10 + Math.random() * (width * 0.5 - width/2.2 - 20), 
                y: -100, type: t1, val: 1, 
                speed: 2.0 * gameSpeed 
            });
        }

        if (distance >= nextBossDistance && !isBossFight) spawnBoss();

        player.update(dt, now); 
        player.draw();
        
        ctx.fillStyle = '#93c5fd'; ctx.beginPath();
        for(let i = bullets.length - 1; i >= 0; i--) {
            const b = bullets[i]; b.y -= b.speed;
            if (b.y < -20) { bullets.splice(i, 1); continue; }
            ctx.rect(b.x - 1.5, b.y, 3, 10);
        }
        ctx.fill();

        for(let i = drops.length - 1; i >= 0; i--) {
            const d = drops[i];
            
            // --- 磁铁吸附逻辑 ---
            const dist = Math.hypot(d.x - player.x, d.y - player.y);
            if (dist < player.magnetRadius) {
                // 进入范围，向玩家飞掠
                const angle = Math.atan2(player.y - d.y, player.x - d.x);
                d.x += Math.cos(angle) * 12;
                d.y += Math.sin(angle) * 12;
            } else {
                d.y += d.speed;
            }

            ctx.save();
            ctx.fillStyle = d.type === 'rpm' ? '#fbbf24' : (d.type === 'dmg' ? '#ef4444' : (d.type === 'mag' ? '#0ea5e9' : '#a855f7'));
            ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle;
            ctx.beginPath(); ctx.roundRect(d.x - 10, d.y - 10, 20, 20, 4); ctx.fill();
            ctx.restore();

            if (dist < 30) { applyBuff(d.type); drops.splice(i, 1); }
            else if (d.y > height) drops.splice(i, 1);
        }

        for(let i = gates.length - 1; i >= 0; i--) {
            const g = gates[i]; g.y += g.speed;
            ctx.save();
            ctx.fillStyle = 'rgba(16, 185, 129, 0.15)';
            ctx.strokeStyle = '#10b981'; ctx.lineWidth = 2;
            ctx.strokeRect(g.x, g.y, width/2.2, 55); ctx.fillRect(g.x, g.y, width/2.2, 55);
            ctx.fillStyle = '#fff'; ctx.font = 'bold 13px Inter'; ctx.textAlign = 'center';
            ctx.fillText("+" + g.val + " " + g.type.toUpperCase(), g.x + width/4.4, g.y + 34);
            ctx.restore();

            if (g.y + 55 > player.y && g.x < player.x + 15 && g.x + width/2.2 > player.x - 15) {
                applyBuff(g.type); gates.splice(i, 1);
            } else if (g.y > height) gates.splice(i, 1);
        }

        for(let i = enemies.length - 1; i >= 0; i--) {
            const e = enemies[i]; e.y += e.speed;
            if (e.isBoss) {
                ctx.drawImage(spriteCache.boss, e.x, e.y);
                ctx.fillStyle = '#450a0a'; ctx.fillRect(e.x, e.y - 15, e.width, 6);
                ctx.fillStyle = '#ef4444'; ctx.fillRect(e.x, e.y - 15, (e.hp / e.maxHp) * e.width, 6);
                if (e.y > 140) e.speed = 0.05; 
            } else {
                ctx.drawImage(e.isElite ? spriteCache.elite : spriteCache.enemy, e.x, e.y);
            }

            ctx.fillStyle = '#fff'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
            const displayHp = e.hp > 1000 ? (e.hp/1000).toFixed(1) + 'K' : Math.ceil(e.hp);
            ctx.fillText(displayHp, e.x + e.width/2, e.y + e.height/2 + 5);

            for(let j = bullets.length - 1; j >= 0; j--) {
                const b = bullets[j];
                if (b.x > e.x && b.x < e.x + e.width && b.y > e.y && b.y < e.y + e.height) {
                    e.hp -= b.dmg; bullets.splice(j, 1);
                }
            }

            if (e.y + e.height > player.y - 8 && e.x < player.x + 12 && e.x + e.width > player.x - 12) {
                if (!player.isInvincible) { player.takeDamage(); if(!e.isBoss) e.hp = 0; }
            }

            if (e.hp <= 0) { 
                score += e.isBoss ? 10000 : (e.isElite ? 250 : 25); 
                combo++; 
                const dropChance = e.isBoss ? 1.0 : (e.isElite ? 0.6 : 0.2); 
                if (Math.random() < dropChance) {
                    const types = ['rpm', 'dmg', 'drones', 'mag'];
                    const count = e.isBoss ? 5 : (e.isElite ? 2 : 1);
                    for(let k=0; k<count; k++) {
                        drops.push({
                            x: e.x + (Math.random() * e.width),
                            y: e.y + (Math.random() * e.height),
                            type: types[Math.floor(Math.random()*types.length)],
                            speed: 2.2
                        });
                    }
                }
                if (e.isBoss) isBossFight = false;
                enemies.splice(i, 1); 
            } else if (e.y > height) { 
                if (e.isBoss) isBossFight = false;
                enemies.splice(i, 1); combo = 0; 
            }
        }

        updateDisplays(false);
        requestAnimationFrame(gameLoop);
    }

    function updateDisplays(force = false) {
        dom.score.textContent = Math.floor(score);
        dom.combo.textContent = combo + 'x';
        if (force && player) {
            dom.dmg.textContent = Math.floor(player.damage);
            dom.mag.textContent = Math.floor(player.magnetRadius);
            
            const rpmVal = player.fireRate;
            dom.rpm.textContent = rpmVal.toFixed(1);
            if (rpmVal >= MAX_FIRE_RATE) dom.rpm.classList.add('max-stat');
            else dom.rpm.classList.remove('max-stat');
            
            const clonesVal = player.clones;
            dom.drn.textContent = clonesVal;
            if (clonesVal >= MAX_CLONES) dom.drn.classList.add('max-stat');
            else dom.drn.classList.remove('max-stat');
        }
    }

    function updateLivesUI() {
        if (!player) return;
        dom.lives.innerHTML = Array(Math.max(0, player.lives)).fill('<div class="w-3 h-3 rounded-sm bg-blue-500 rotate-45"></div>').join('');
    }

    function init() {
        const rect = dom.wrapper.getBoundingClientRect();
        width = canvas.width = rect.width;
        height = canvas.height = rect.height;
    }
    window.addEventListener('resize', init);
    init();

    function endGame() {
        gameState = STATE.GAMEOVER;
        dom.menu.classList.remove('hidden');
        dom.gameOver.classList.remove('hidden');
        dom.finalScore.innerText = Math.floor(score);
        dom.ui.classList.add('hidden');
    }

    document.getElementById('startBtn').onclick = () => {
        player = new Player();
        bullets = []; enemies = []; gates = []; drops = []; score = 0; combo = 0; distance = 0; gameSpeed = 1;
        isBossFight = false; nextBossDistance = 15000;
        updateLivesUI(); updateDisplays(true);
        gameState = STATE.PLAYING;
        dom.menu.classList.add('hidden'); dom.ui.classList.remove('hidden');
        dom.gameOver.classList.add('hidden');
        lastTime = performance.now();
        requestAnimationFrame(gameLoop);
    };

    const move = (e) => { 
        if (!player) return;
        const rect = dom.wrapper.getBoundingClientRect();
        const clientX = (e.touches ? e.touches[0].clientX : e.clientX);
        player.targetX = clientX - rect.left; 
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('touchmove', (e) => { 
        if (gameState === STATE.PLAYING) e.preventDefault(); 
        move(e); 
    }, { passive: false });
</script>
</body>
</html>
