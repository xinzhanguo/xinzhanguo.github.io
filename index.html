<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点亮宇宙</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000;
    font-family: 'Georgia', serif;
    user-select: none;
  }

  canvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
  }

  /* 星云层 */
  .nebula {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0;
    transition: opacity 3s ease;
    pointer-events: none;
    z-index: 0;
  }

  body.on .nebula { opacity: 1; }

  .nebula-1 {
    width: 600px; height: 400px;
    background: radial-gradient(ellipse, rgba(80,40,160,0.25), rgba(40,20,100,0.1), transparent);
    top: 10%; left: 5%;
    transition-delay: 0.5s;
  }
  .nebula-2 {
    width: 500px; height: 500px;
    background: radial-gradient(ellipse, rgba(20,80,160,0.2), rgba(10,40,100,0.08), transparent);
    top: 40%; right: 5%;
    transition-delay: 0.8s;
  }
  .nebula-3 {
    width: 700px; height: 350px;
    background: radial-gradient(ellipse, rgba(160,40,80,0.15), rgba(80,20,60,0.06), transparent);
    bottom: 15%; left: 20%;
    transition-delay: 1.1s;
  }
  .nebula-4 {
    width: 400px; height: 400px;
    background: radial-gradient(ellipse, rgba(40,120,120,0.18), rgba(20,60,80,0.06), transparent);
    top: 20%; right: 25%;
    transition-delay: 1.4s;
  }

  /* 银河带 */
  .milky-way {
    position: fixed;
    width: 160%;
    height: 120px;
    top: 35%;
    left: -30%;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(180,180,220,0) 10%,
      rgba(180,180,220,0.04) 30%,
      rgba(200,200,240,0.06) 50%,
      rgba(180,180,220,0.04) 70%,
      rgba(180,180,220,0) 90%,
      transparent 100%
    );
    transform: rotate(-15deg);
    filter: blur(30px);
    opacity: 0;
    transition: opacity 3.5s ease;
    pointer-events: none;
    z-index: 0;
  }

  body.on .milky-way { opacity: 1; transition-delay: 1.5s; }

  /* 开关容器 */
  .switch-container {
    position: fixed;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    z-index: 100;
  }

  .switch-label {
    color: rgba(120,120,150,0.4);
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    transition: all 1.5s ease;
  }

  body.on .switch-label {
    color: rgba(180,200,255,0.7);
    text-shadow: 0 0 20px rgba(100,150,255,0.3);
  }

  .switch {
    width: 80px;
    height: 40px;
    background: rgba(20,20,35,0.8);
    border-radius: 20px;
    cursor: pointer;
    position: relative;
    border: 2px solid rgba(80,80,120,0.3);
    transition: all 0.8s ease;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
  }

  .switch:hover {
    border-color: rgba(100,140,255,0.5);
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.5), 0 0 20px rgba(100,140,255,0.15);
  }

  body.on .switch {
    background: rgba(30,35,60,0.8);
    border-color: rgba(100,150,255,0.5);
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.3), 0 0 30px rgba(100,150,255,0.2);
  }

  .switch-knob {
    width: 32px;
    height: 32px;
    background: radial-gradient(circle at 40% 35%, #555, #333);
    border-radius: 50%;
    position: absolute;
    top: 2px;
    left: 2px;
    transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  body.on .switch-knob {
    left: 42px;
    background: radial-gradient(circle at 40% 35%, #aaccff, #6699ff);
    box-shadow: 0 2px 12px rgba(100,150,255,0.5), 0 0 25px rgba(100,150,255,0.3);
  }

  /* 流星 */
  .shooting-star {
    position: fixed;
    width: 100px;
    height: 1px;
    background: linear-gradient(90deg, rgba(255,255,255,0.8), transparent);
    opacity: 0;
    z-index: 2;
    pointer-events: none;
    transform: rotate(-35deg);
  }

  body.on .shooting-star {
    animation: shoot 6s ease-in infinite;
  }

  .shooting-star:nth-child(1) { top: 15%; left: 70%; animation-delay: 2s; }
  .shooting-star:nth-child(2) { top: 25%; left: 40%; animation-delay: 5s; width: 70px; }
  .shooting-star:nth-child(3) { top: 8%; left: 55%; animation-delay: 9s; width: 130px; }

  @keyframes shoot {
    0% { opacity: 0; transform: rotate(-35deg) translateX(0); }
    2% { opacity: 1; }
    8% { opacity: 0; transform: rotate(-35deg) translateX(-300px); }
    100% { opacity: 0; }
  }

  /* 提示文字 */
  .hint {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(80,80,100,0.25);
    font-size: 18px;
    letter-spacing: 6px;
    z-index: 10;
    transition: all 2s ease;
    pointer-events: none;
  }

  body.on .hint {
    opacity: 0;
  }
</style>
</head>
<body>

  <!-- 星云 -->
  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>
  <div class="nebula nebula-3"></div>
  <div class="nebula nebula-4"></div>

  <!-- 银河 -->
  <div class="milky-way"></div>

  <!-- 星空画布 -->
  <canvas id="starfield"></canvas>

  <!-- 流星 -->
  <div class="shooting-star"></div>
  <div class="shooting-star"></div>
  <div class="shooting-star"></div>

  <!-- 提示 -->
  <div class="hint">点亮宇宙</div>

  <!-- 开关 -->
  <div class="switch-container">
    <div class="switch-label" id="switchLabel">OFF</div>
    <div class="switch" id="switchBtn" onclick="toggleUniverse()">
      <div class="switch-knob"></div>
    </div>
  </div>

<script>
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let W, H;
  let isOn = false;
  let brightness = 0;       // 0~1 渐变
  let targetBrightness = 0;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // ===== 星星数据 =====
  const STAR_COUNT = 500;
  const stars = [];

  // 星星颜色池：白、蓝白、淡黄、橙
  const starColors = [
    { r: 255, g: 255, b: 255 },
    { r: 200, g: 220, b: 255 },
    { r: 180, g: 200, b: 255 },
    { r: 255, g: 240, b: 200 },
    { r: 255, g: 220, b: 180 },
    { r: 160, g: 200, b: 255 },
    { r: 255, g: 200, b: 160 },
  ];

  for (let i = 0; i < STAR_COUNT; i++) {
    const color = starColors[Math.floor(Math.random() * starColors.length)];
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      radius: 0.3 + Math.random() * 2.2,
      color: color,
      // 闪烁参数
      twinkleSpeed: 0.5 + Math.random() * 2,
      twinkleOffset: Math.random() * Math.PI * 2,
      // 亮灭过渡延迟（远近感）
      delay: Math.random() * 2,
    });
  }

  // ===== 特别亮的几颗大星 =====
  const BRIGHT_COUNT = 15;
  const brightStars = [];
  for (let i = 0; i < BRIGHT_COUNT; i++) {
    const color = starColors[Math.floor(Math.random() * 3)]; // 偏蓝白
    brightStars.push({
      x: Math.random() * W,
      y: Math.random() * H * 0.7,
      radius: 2 + Math.random() * 1.5,
      color: color,
      twinkleSpeed: 0.3 + Math.random() * 1,
      twinkleOffset: Math.random() * Math.PI * 2,
      delay: Math.random() * 1.5,
      spikeLength: 8 + Math.random() * 15,
    });
  }

  // ===== 开关 =====
  function toggleUniverse() {
    isOn = !isOn;
    targetBrightness = isOn ? 1 : 0;
    document.body.classList.toggle('on', isOn);
    document.getElementById('switchLabel').textContent = isOn ? 'ON' : 'OFF';
  }

  // 键盘支持
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      toggleUniverse();
    }
  });

  // ===== 绘制 =====
  let time = 0;

  function draw() {
    time += 0.016;

    // 平滑过渡亮度
    brightness += (targetBrightness - brightness) * 0.02;

    ctx.clearRect(0, 0, W, H);

    // 绘制普通星星
    for (const star of stars) {
      const effectiveBrightness = Math.max(0, Math.min(1, (brightness - star.delay * 0.3) / 0.7));
      if (effectiveBrightness <= 0) continue;

      const twinkle = 0.5 + 0.5 * Math.sin(time * star.twinkleSpeed + star.twinkleOffset);
      const alpha = effectiveBrightness * (0.4 + 0.6 * twinkle);
      const r = star.color.r, g = star.color.g, b = star.color.b;

      // 光晕
      if (star.radius > 1 && effectiveBrightness > 0.3) {
        const glow = ctx.createRadialGradient(star.x, star.y, 0, star.x, star.y, star.radius * 4);
        glow.addColorStop(0, `rgba(${r},${g},${b},${alpha * 0.3})`);
        glow.addColorStop(1, `rgba(${r},${g},${b},0)`);
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius * 4, 0, Math.PI * 2);
        ctx.fill();
      }

      // 星点
      ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.radius * effectiveBrightness, 0, Math.PI * 2);
      ctx.fill();
    }

    // 绘制亮星（带十字光芒）
    for (const star of brightStars) {
      const effectiveBrightness = Math.max(0, Math.min(1, (brightness - star.delay * 0.2) / 0.6));
      if (effectiveBrightness <= 0) continue;

      const twinkle = 0.5 + 0.5 * Math.sin(time * star.twinkleSpeed + star.twinkleOffset);
      const alpha = effectiveBrightness * (0.6 + 0.4 * twinkle);
      const r = star.color.r, g = star.color.g, b = star.color.b;

      // 大光晕
      const glow = ctx.createRadialGradient(star.x, star.y, 0, star.x, star.y, star.radius * 8);
      glow.addColorStop(0, `rgba(${r},${g},${b},${alpha * 0.4})`);
      glow.addColorStop(0.3, `rgba(${r},${g},${b},${alpha * 0.15})`);
      glow.addColorStop(1, `rgba(${r},${g},${b},0)`);
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.radius * 8, 0, Math.PI * 2);
      ctx.fill();

      // 十字光芒
      const spikeLen = star.spikeLength * effectiveBrightness * (0.7 + 0.3 * twinkle);
      const spikeAlpha = alpha * 0.6;

      ctx.strokeStyle = `rgba(${r},${g},${b},${spikeAlpha})`;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(star.x - spikeLen, star.y);
      ctx.lineTo(star.x + spikeLen, star.y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(star.x, star.y - spikeLen);
      ctx.lineTo(star.x, star.y + spikeLen);
      ctx.stroke();

      // 对角线光芒（较短）
      const diagLen = spikeLen * 0.5;
      ctx.lineWidth = 0.5;
      ctx.strokeStyle = `rgba(${r},${g},${b},${spikeAlpha * 0.5})`;
      ctx.beginPath();
      ctx.moveTo(star.x - diagLen * 0.707, star.y - diagLen * 0.707);
      ctx.lineTo(star.x + diagLen * 0.707, star.y + diagLen * 0.707);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(star.x + diagLen * 0.707, star.y - diagLen * 0.707);
      ctx.lineTo(star.x - diagLen * 0.707, star.y + diagLen * 0.707);
      ctx.stroke();

      // 星点核心
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.radius * effectiveBrightness, 0, Math.PI * 2);
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }

  draw();

  // 窗口缩放时重新分布星星
  window.addEventListener('resize', () => {
    for (const star of stars) {
      star.x = Math.random() * W;
      star.y = Math.random() * H;
    }
    for (const star of brightStars) {
      star.x = Math.random() * W;
      star.y = Math.random() * H * 0.7;
    }
  });
</script>

</body>
</html>
